# 3-node dqlite test cluster.
#
# By default this pulls the published image
# ``letsdiscodev/dqlite:0.1.0-patched-null`` (built from the
# ``Dockerfile`` next to this file: canonical/dqlite v1.18.5 + the
# NULL-type-preservation patch tracked at
# https://github.com/canonical/dqlite/issues/882). To rebuild from
# source:
#
#   docker compose build
#   docker compose up -d
#
# Networking model
# ----------------
#
# Every container runs in ``network_mode: host`` so the address each
# node advertises to the rest of the cluster (``127.0.0.1:900N``) is
# reachable BOTH from sibling nodes and from a test runner sitting on
# the host. Without host networking, dqlite-demo binds to the
# container's interface and advertises something a host-side client
# cannot reach (the bridge-network interface, or the unspecified
# ``0.0.0.0`` literal that the client correctly rejects). On host
# networking, ``localhost`` inside any container is the same loopback
# the host sees, so ``127.0.0.1:9001`` works from every direction —
# host-side clients reach the leader, followers reach the leader,
# leader reaches followers. The three nodes use ports 9001-9003,
# which is the canonical dqlite port range; the four sibling
# packages' integration tests default to ``localhost:9001`` for the
# bootstrap address with no env-var overrides needed.

services:
  node1:
    image: letsdiscodev/dqlite:0.1.0-patched-null
    build: .
    container_name: dqlite-node1
    network_mode: host
    environment:
      - NODE_ID=1
      - PORT=9001
      - API_PORT=8001
      - BIND_ADDRESS=127.0.0.1:9001
      - BOOTSTRAP=true
    volumes:
      - node1-data:/data
      # Mount the in-repo init script over the baked-in one so this
      # repo is the ground truth for cluster boot behaviour. Without
      # the override, the published image's baked-in init-node.sh
      # advertises ``0.0.0.0:PORT`` (the unspecified literal that
      # dqlite clients correctly reject). Rebuilding the image
      # (``docker compose build``) bakes the in-repo script directly
      # and removes the need for the mount.
      - ./scripts/init-node.sh:/app/init-node.sh:ro
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  node2:
    image: letsdiscodev/dqlite:0.1.0-patched-null
    build: .
    container_name: dqlite-node2
    network_mode: host
    environment:
      - NODE_ID=2
      - PORT=9002
      - API_PORT=8002
      - BIND_ADDRESS=127.0.0.1:9002
      - JOIN=127.0.0.1:9001
    volumes:
      - node2-data:/data
      - ./scripts/init-node.sh:/app/init-node.sh:ro
    depends_on:
      node1:
        condition: service_healthy

  node3:
    image: letsdiscodev/dqlite:0.1.0-patched-null
    build: .
    container_name: dqlite-node3
    network_mode: host
    environment:
      - NODE_ID=3
      - PORT=9003
      - API_PORT=8003
      - BIND_ADDRESS=127.0.0.1:9003
      - JOIN=127.0.0.1:9001
    volumes:
      - node3-data:/data
      - ./scripts/init-node.sh:/app/init-node.sh:ro
    depends_on:
      node1:
        condition: service_healthy

  # Optional 4th node, started on demand via the ``spare`` profile.
  # Used by ``TestClusterControl.start_spare_node()`` /
  # ``stop_spare_node()`` to test live Raft membership operations
  # (assign_role to/from VOTER, etc.) that need a real
  # process catching up via Raft replication.
  #
  # Default ``docker compose up -d`` does NOT start node4 because
  # it carries the ``spare`` profile. Bring it up with:
  #   docker compose --profile spare up -d node4
  # Stop + tear it down with:
  #   docker compose stop node4 && docker compose rm -fv node4
  #   docker volume rm cluster_node4-data
  #
  # node4 self-joins as a Spare via ``--join 127.0.0.1:9001`` (the
  # init script). Tests that want it as a Voter run ``cluster.
  # assign_role(node4_id, NodeRole.VOTER)`` after the auto-join.
  node4:
    image: letsdiscodev/dqlite:0.1.0-patched-null
    build: .
    container_name: dqlite-node4
    network_mode: host
    profiles:
      - spare
    environment:
      - NODE_ID=4
      - PORT=9004
      - API_PORT=8004
      - BIND_ADDRESS=127.0.0.1:9004
      - JOIN=127.0.0.1:9001
    volumes:
      - node4-data:/data
      - ./scripts/init-node.sh:/app/init-node.sh:ro
    # No depends_on — node4 may be started LONG after the rest of
    # the cluster is up, and waiting on healthcheck would create a
    # synthetic dependency we'd have to undo on teardown.

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
